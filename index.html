<script>
/* ============================================================
   설정 — 이 블록만 수정하면 됩니다.

   APPS_SCRIPT_URL:
     1) 구글 시트 메뉴 → 확장 프로그램 → Apps Script
     2) leaderboard_api.gs 코드를 붙여넣고 저장
     3) [배포] → [새 배포]
          - 유형: 웹 앱
          - 다음 사용자로 실행: 나(스크립트 소유자)
          - 액세스 권한: 모든 사용자(익명 포함)
     4) 배포 후 나오는 웹 앱 URL을 아래에 붙여넣기
     비워두면 샘플 데이터로 표시됩니다.

   ★ 시트는 비공개로 유지됩니다. Apps Script가 학번·이름·트랙·거리·기록·검증여부
     만 추려서 반환하며, 사진·이메일·타임스탬프 등 나머지 컬럼은 노출되지 않습니다.
   ============================================================ */
const CONFIG = {
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxCT4kkT4l4IHE_0MttqCrwrzfVGTfRop2INS1yYdj_ivlyuhAVig3S_SUtzfaXiy2_PA/exec",
  eventName: "SIT 동문회 온라인 마라톤",
  eventMeta: "2026 Summer",
  notice: "러닝 기록은 동문회 카카오톡/인스타그램/구글 폼에 제출해 주세요!\n제출된 기록 반영은 1-2일 정도 소요될 수 있습니다.",
  onlyVerified: false,   // true 로 두면 '검증됨' 기록만 순위에 반영
  recordIsPace: true,    // 기록 열이 '1km당 페이스'(5:30/km)이면 true. '총 완주 시간'이면 false
};

const TABS = [
  { label: '5km',     key: '5km' },
  { label: '10km',    key: '10km' },
  { label: '누적 거리', key: 'cum' },
];

/* ---- 샘플 데이터 (SHEET_CSV_URL 비어있을 때) : {track, studentId, name, distance, time} ---- */
const SAMPLE = [
  { track:'5km', studentId:'08', name:'김도현', distance:5, time:'19:42' },
  { track:'5km', studentId:'16', name:'신유나', distance:5, time:'20:15' },
  { track:'5km', studentId:'05', name:'박준호', distance:5, time:'21:03' },
  { track:'5km', studentId:'15', name:'최민지', distance:5, time:'21:48' },
  { track:'5km', studentId:'10', name:'정우성', distance:5, time:'22:30' },
  { track:'5km', studentId:'18', name:'한지민', distance:5, time:'23:12' },
  { track:'5km', studentId:'03', name:'오세훈', distance:5, time:'24:05' },
  { track:'10km', studentId:'05', name:'박준호', distance:10, time:'41:20' },
  { track:'10km', studentId:'08', name:'김도현', distance:10, time:'43:05' },
  { track:'10km', studentId:'10', name:'정우성', distance:10, time:'44:50' },
  { track:'10km', studentId:'16', name:'신유나', distance:10, time:'46:30' },
  { track:'10km', studentId:'18', name:'한지민', distance:10, time:'48:10' },
  { track:'10km', studentId:'07', name:'임재현', distance:10, time:'1:02:48' },
  // 누적용 추가 기록
  { track:'5km', studentId:'10', name:'정우성', distance:5, time:'22:50' },
  { track:'5km', studentId:'18', name:'한지민', distance:8.4, time:'40:00' },
  { track:'10km', studentId:'10', name:'정우성', distance:10, time:'45:30' },
  { track:'5km', studentId:'08', name:'김도현', distance:6, time:'25:00' },
];

/* ========================= 로직 ========================= */
let SECTIONS = [];   // 캐시: 탭 전환 시 재생성 금지 (스크롤 위치 보존)
let PEOPLE = new Map();   // 개인 상세용 (key = 학번|이름)
let activeTab = 0;
const scroller = document.getElementById('scroller');
const personPanel = document.getElementById('personPanel');

document.getElementById('evName').textContent = CONFIG.eventName;
document.getElementById('evMeta').textContent = CONFIG.eventMeta;

/* 공지 블록 HTML (본문 스크롤러 맨 위에 렌더 → 스크롤하면 함께 사라짐) */
function noticeHTML() {
  if (!CONFIG.notice) return '';
  return `
    <div style="margin:12px 18px;background:var(--bg-surface);border-radius:14px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;">
      <span style="flex-shrink:0;margin-top:1px;font-family:var(--font-ui);font-size:10px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--spotify-green);background:#e7eeff;border-radius:6px;padding:4px 8px;">공지</span>
      <div style="font-size:13.5px;line-height:1.55;color:var(--text-muted);white-space:pre-line;">${esc(CONFIG.notice)}</div>
    </div>`;
}

/* CSV 파서 — 따옴표로 감싼 필드(쉼표·줄바꿈 포함) 처리 */
function parseCSV(text) {
  const rows = []; let row = [], field = '', q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (q) {
      if (c === '"') { if (text[i+1] === '"') { field += '"'; i++; } else q = false; }
      else field += c;
    } else {
      if (c === '"') q = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

/* 헤더 이름으로 열 인덱스 찾기 */
function colIndex(headers, keywords) {
  for (let i = 0; i < headers.length; i++) {
    const h = (headers[i] || '').toLowerCase();
    if (keywords.some(k => h.includes(k))) return i;
  }
  return -1;
}

/* 트랙 값 정규화 */
function normTrack(v) {
  const s = String(v || '').toLowerCase().replace(/\s/g, '');
  if (s.includes('10')) return '10km';
  if (s.includes('5')) return '5km';
  return '';
}

/* 시간/페이스 문자열 → 초. 다양한 입력에 강건.
   지원: "1:02:48" · "5:30" · "5 : 30" · "5분30초" · "5분 30초" · "5분" · "90초"
        · "1시간2분48초" · "5'30\"" · "5’30”" · 접미사 "/km"·"pace"·"페이스" */
function toSeconds(t) {
  let s = String(t == null ? '' : t).trim().toLowerCase();
  if (!s) return NaN;
  s = s.replace(/\/\s*km/g, '').replace(/pace|페이스/g, '').trim();
  // 한글 단위(시간·분·초)
  if (/[시분초]/.test(s)) {
    const h = (s.match(/(\d+)\s*시간/) || [])[1];
    const m = (s.match(/(\d+)\s*분/) || [])[1];
    const sec = (s.match(/(\d+)\s*초/) || [])[1];
    if (h || m || sec) return (+(h||0))*3600 + (+(m||0))*60 + (+(sec||0));
  }
  // 따옴표(분'초") → 콜론, 공백 제거
  s = s.replace(/[’′']/g, ':').replace(/[”″"]/g, '').replace(/\s+/g, '');
  const parts = s.split(':').filter(x => x !== '');
  if (!parts.length) return NaN;
  const nums = parts.map(Number);
  if (nums.some(isNaN)) return NaN;
  if (nums.length >= 3) return nums[0]*3600 + nums[1]*60 + nums[2];
  if (nums.length === 2) return nums[0]*60 + nums[1];
  return nums[0]*60;   // 단일 숫자는 '분'으로 간주 (예: "5" → 5:00)
}

/* 기록 입력 → km당 페이스(초).
   - CONFIG.recordIsPace 가 true 거나 값이 5:30/km·pace·페이스 형태면 → 그대로 km당 페이스로 해석
   - 그 외(총 완주 시간)면 → 시간 ÷ 거리 로 페이스 계산 */
function paceSeconds(record, dist) {
  const raw = String(record || '').trim();
  const sec = toSeconds(raw);
  if (isNaN(sec)) return NaN;
  if (CONFIG.recordIsPace || /\/\s*km/i.test(raw) || /pace|페이스/i.test(raw)) return sec;
  if (!dist) return NaN;
  return sec / dist;
}

function fmtPace(secPerKm) {
  const s = Math.round(secPerKm);
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0') + '/km';
}

/* 초 → "M:SS" 또는 "H:MM:SS" (완주 시간 표기) */
function fmtTime(sec) {
  sec = Math.round(sec);
  const two = n => String(n).padStart(2,'0');
  return sec >= 3600
    ? Math.floor(sec/3600) + ':' + two(Math.floor(sec%3600/60)) + ':' + two(sec%60)
    : Math.floor(sec/60) + ':' + two(sec%60);
}

function isVerified(v) {
  const s = String(v || '').trim().toLowerCase();
  return ['✓','y','yes','예','o','true','1','검증','확인'].includes(s);
}

/* 원본 응답 행 → 정규화된 기록 배열 */
function recordsFromRows(rows) {
  if (!rows.length) return [];
  const H = rows[0];
  const iId = colIndex(H, ['학번']);
  const iName = colIndex(H, ['이름','성함']);
  const iTrack = colIndex(H, ['트랙','종목','코스']);
  const iDist = colIndex(H, ['거리']);
  const iRec = colIndex(H, ['기록','시간','페이스','pace']);
  const iVer = colIndex(H, ['검증','확인','verif']);
  const out = [];
  for (let r = 1; r < rows.length; r++) {
    const c = rows[r]; if (!c || !c.length) continue;
    const name = (iName>=0 ? c[iName] : '').trim();
    const track = normTrack(iTrack>=0 ? c[iTrack] : '');
    if (!name && !track) continue;
    out.push({
      studentId: (iId>=0 ? c[iId] : '').trim(),
      name,
      track,
      distance: parseFloat((iDist>=0 ? c[iDist] : '').toString().replace(/[^0-9.]/g,'')) || 0,
      time: (iRec>=0 ? c[iRec] : '').trim(),
      verified: iVer>=0 ? isVerified(c[iVer]) : false,
    });
  }
  return out;
}

/* 사람 구분 키: 서버가 준 key(실명 해시) 우선, 없으면(로컬 샘플) 학번|이름 */
const keyOf = r => r.key || ((r.studentId || '') + '|' + r.name);
const stdDistOf = trackKey => trackKey === '10km' ? 10 : 5;

/* 5km / 10km : 사람별 최고(빠른) 페이스 1건, 빠른 순.
   표기(disp)는 '해당 거리 기준 환산 완주 시간'(페이스 × 기준거리) — 실제 달린 거리가 달라도 공정 비교 */
function buildTimed(records, trackKey) {
  const stdDist = stdDistOf(trackKey);
  const best = new Map();
  records.filter(r => r.track === trackKey)
         .filter(r => !CONFIG.onlyVerified || r.verified)
         .forEach(r => {
    const dist = r.distance || stdDist;
    const ps = paceSeconds(r.time, dist);
    if (isNaN(ps)) return;
    const k = keyOf(r);
    const prev = best.get(k);
    if (!prev || ps < prev.ps) best.set(k, { ...r, ps });
  });
  return [...best.values()].sort((a,b) => a.ps - b.ps)
    .map((e,i) => ({ rank:i+1, key:keyOf(e), name:e.name, studentId:e.studentId,
                     disp:fmtTime(e.ps * stdDist), pace:fmtPace(e.ps), verified:e.verified }));
}

/* 누적 : 사람별 모든 거리 합, 내림차순 */
function buildCum(records) {
  const sum = new Map();
  records.filter(r => !CONFIG.onlyVerified || r.verified).forEach(r => {
    const k = keyOf(r);
    const cur = sum.get(k) || { key:k, name:r.name, studentId:r.studentId, total:0, verified:false };
    cur.total += r.distance || 0;
    cur.verified = cur.verified || r.verified;
    sum.set(k, cur);
  });
  return [...sum.values()].filter(e => e.total > 0).sort((a,b) => b.total - a.total)
    .map((e,i) => ({ rank:i+1, key:e.key, name:e.name, studentId:e.studentId, disp:e.total.toFixed(1)+' km', verified:e.verified }));
}

function buildSections(records) {
  return TABS.map(t => {
    const timed = t.key !== 'cum';
    const rows = timed ? buildTimed(records, t.key) : buildCum(records);
    return {
      key:t.key, label:t.label,
      unit: timed ? '환산 기록' : '누적 거리',
      note: timed ? `${t.key} 기준 환산 완주 시간 (km당 페이스 × ${stdDistOf(t.key)}km)` : '',
      p1:rows[0], p2:rows[1], p3:rows[2], rest:rows.slice(3),
    };
  });
}

/* 개인별 데이터: 순위 + 제출 기록 이력 (key = 학번|이름) */
function buildPeople(records) {
  const rows5 = buildTimed(records, '5km');
  const rows10 = buildTimed(records, '10km');
  const rowsCum = buildCum(records);
  const people = new Map();
  records.forEach(r => {
    const k = keyOf(r);
    if (!people.has(k)) people.set(k, { key:k, studentId:r.studentId, name:r.name, subs:[] });
    const dist = r.distance || 0;
    const ps = paceSeconds(r.time, dist || stdDistOf(r.track));
    people.get(k).subs.push({ track:r.track, distance:dist, ps, pace:isNaN(ps)?'—':fmtPace(ps), verified:r.verified });
  });
  people.forEach((p, k) => {
    p.best5 = rows5.find(x => x.key === k) || null;
    p.best10 = rows10.find(x => x.key === k) || null;
    p.cum = rowsCum.find(x => x.key === k) || null;
    // 트랙별 개인 최고(가장 빠른 페이스)에 ⭐ 표시
    const bestPs = {};
    p.subs.forEach(s => { if (!isNaN(s.ps) && (bestPs[s.track] === undefined || s.ps < bestPs[s.track])) bestPs[s.track] = s.ps; });
    p.subs.forEach(s => { s.best = !isNaN(s.ps) && s.ps === bestPs[s.track]; });
    // 빠른 기록이 위로 오도록 정렬(트랙 무관, 페이스 오름차순), 없는 값은 뒤로
    p.subs.sort((a, b) => (isNaN(a.ps) ? Infinity : a.ps) - (isNaN(b.ps) ? Infinity : b.ps));
  });
  return people;
}

/* ========================= 렌더 ========================= */
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const vbadge = v => v ? ' <span title="기록 검증됨" style="color:var(--spotify-green);font-size:0.85em;">✓</span>' : '';
const nm = p => p ? esc(p.name) : '—';
const sid = p => p && p.studentId ? esc(p.studentId)+'학번' : '&nbsp;';
const dp = p => p ? esc(p.disp) : '—';

function podiumCard(p, place) {
  const styleMap = {
    2:{ flex:'1', bg:'var(--bg-surface)', top:'#b3b9c2', numColor:'#7f8893', label:'2ND', big:'36px', extra:'' },
    1:{ flex:'1.22', bg:'linear-gradient(180deg,#3d6ff2 0%,#2f5fe0 100%)', top:'#bcd0ff', numColor:'#ffffff', label:'CHAMPION', big:'52px',
        extra:'border:1px solid var(--spotify-green-border);box-shadow:0 12px 34px rgba(61,111,242,0.28);' },
    3:{ flex:'1', bg:'var(--bg-surface)', top:'#d8924f', numColor:'#d8924f', label:'3RD', big:'36px', extra:'' },
  };
  const s = styleMap[place];
  const nameColor = place===1 ? '#ffffff' : 'var(--text-base)';
  const sidColor  = place===1 ? 'rgba(255,255,255,0.85)' : 'var(--text-secondary)';
  const dispColor = place===1 ? '#ffffff' : 'var(--text-base)';
  const pad = place===1 ? '18px 10px 22px' : '16px 10px';
  const radius = place===1 ? '16px' : '14px';
  const crown = place===1 ? '<div style="font-size:20px;line-height:1;">👑</div>' : '';
  const labelGap = place===1 ? 'margin-top:4px;' : '';
  return `
    <div ${p&&p.key?`data-pid="${esc(p.key)}"`:''} style="flex:${s.flex};background:${s.bg};border-top:3px solid ${s.top};border-radius:${radius};padding:${pad};text-align:center;${p?'cursor:pointer;':''}${s.extra}">
      ${crown}
      <div style="font-family:var(--font-title);font-size:${s.big};font-weight:900;color:${s.numColor};line-height:1;${labelGap}">${place}</div>
      <div style="font-size:${place===1?11:10}px;font-weight:800;letter-spacing:${place===1?2:1.8}px;color:${s.numColor};margin-top:3px;">${s.label}</div>
      <div style="font-size:${place===1?17:15}px;font-weight:${place===1?900:800};color:${nameColor};margin-top:12px;">${nm(p)}${vbadge(p&&p.verified)}</div>
      <div style="font-size:11px;color:${sidColor};">${sid(p)}</div>
      <div style="font-size:${place===1?21:16}px;font-weight:900;font-variant-numeric:tabular-nums;color:${dispColor};margin-top:8px;">${dp(p)}</div>
    </div>`;
}

function sectionHTML(sec) {
  const restRows = sec.rest.map(r => `
    <div data-pid="${esc(r.key)}" style="display:flex;align-items:center;gap:16px;padding:14px 6px;border-bottom:1px solid #eaecef;cursor:pointer;">
      <span style="width:26px;text-align:center;color:var(--text-secondary);font-weight:800;font-size:16px;font-variant-numeric:tabular-nums;">${r.rank}</span>
      <div style="flex:1;min-width:0;display:flex;align-items:baseline;gap:8px;">
        <span style="font-weight:700;font-size:16px;color:var(--text-base);white-space:nowrap;flex-shrink:0;">${esc(r.name)}${vbadge(r.verified)}</span>
        <span style="font-size:12px;color:var(--text-secondary);flex-shrink:0;">${r.studentId?esc(r.studentId)+'학번':''}</span>
      </div>
      <span style="font-variant-numeric:tabular-nums;font-weight:800;font-size:16px;color:var(--text-base);">${esc(r.disp)}</span>
    </div>`).join('');

  const empty = !sec.p1 ? `<div style="padding:30px 6px;text-align:center;color:var(--text-secondary);font-size:14px;">아직 기록이 없어요. 첫 주자가 되어보세요!</div>` : '';

  return `
    <div data-sec="1" style="padding:20px 18px 30px;border-top:4px solid #f1f2f5;">
      <div style="display:flex;align-items:baseline;gap:9px;margin:0 2px 4px;">
        <span style="font-family:var(--font-title);font-size:21px;font-weight:900;letter-spacing:-0.02em;color:var(--text-base);">${esc(sec.label)}</span>
        <span style="font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-secondary);">${esc(sec.unit)} · TOP 3</span>
      </div>
      ${ sec.note ? `<div style="margin:0 2px 16px;font-size:11px;color:var(--text-secondary);opacity:0.7;">${esc(sec.note)}</div>` : '<div style="margin-bottom:16px;"></div>' }
      ${ sec.p1 ? `
      <div style="display:flex;align-items:flex-end;gap:10px;margin-bottom:24px;">
        ${podiumCard(sec.p2,2)}
        ${podiumCard(sec.p1,1)}
        ${podiumCard(sec.p3,3)}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0 6px 8px;border-bottom:1px solid #e5e7eb;margin-bottom:4px;">
        <span style="font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-secondary);">순위</span>
        <span style="font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-secondary);">${esc(sec.unit)}</span>
      </div>
      ${restRows}` : empty }
    </div>`;
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = TABS.map((t,i) => {
    const inner = i === activeTab
      ? `<span style="color:var(--text-base);border-bottom:2.5px solid var(--spotify-green);padding-bottom:10px;">${t.label}</span>`
      : `<span style="color:var(--text-secondary);">${t.label}</span>`;
    return `<button data-tab="${i}" style="background:none;border:none;cursor:pointer;padding:0 0 12px;font-family:var(--font-ui);font-size:15px;font-weight:700;letter-spacing:0.4px;white-space:nowrap;">${inner}</button>`;
  }).join('');
  el.querySelectorAll('button').forEach(b => b.onclick = () => goTo(+b.dataset.tab));
}

function renderSections() {
  scroller.innerHTML = noticeHTML() + SECTIONS.map(sectionHTML).join('');
}

function goTo(i) {
  const sec = scroller.querySelectorAll('[data-sec]')[i];
  if (!sec) return;
  scroller.scrollTop = Math.min(sec.offsetTop, scroller.scrollHeight - scroller.clientHeight);
  activeTab = i; renderTabs();
}

scroller.addEventListener('scroll', () => {
  const secs = [...scroller.querySelectorAll('[data-sec]')];
  let idx = 0;
  for (let k = 0; k < secs.length; k++) if (scroller.scrollTop >= secs[k].offsetTop - 120) idx = k;
  if (idx !== activeTab) { activeTab = idx; renderTabs(); }
}, { passive:true });

/* 순위표에서 사람 클릭 → 개인 상세 열기 */
scroller.addEventListener('click', e => {
  const el = e.target.closest('[data-pid]');
  if (el && el.dataset.pid) openPerson(el.dataset.pid);
});

function setData(records) {
  SECTIONS = buildSections(records);
  PEOPLE = buildPeople(records);
  renderSections();
  renderTabs();
}

/* ---- 개인 상세 페이지 ---- */
function statCard(label, val, rankText) {
  return `
    <div style="flex:1;background:var(--bg-surface);border-radius:14px;padding:14px 12px;">
      <div style="font-size:10px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-secondary);">${label}</div>
      <div style="font-family:var(--font-title);font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--text-base);margin-top:6px;">${val}</div>
      <div style="font-size:11px;font-weight:700;color:var(--spotify-green);margin-top:2px;">${rankText}</div>
    </div>`;
}

function openPerson(key) {
  const p = PEOPLE.get(key);
  if (!p) return;
  const rankTxt = row => row ? row.rank + '위' : '기록 없음';
  const subRows = p.subs.map(s => `
    <div style="display:flex;align-items:center;gap:14px;padding:14px 4px;border-bottom:1px solid #eaecef;">
      <span style="flex-shrink:0;font-family:var(--font-ui);font-size:11px;font-weight:800;letter-spacing:0.5px;color:var(--spotify-green);background:#e7eeff;border-radius:6px;padding:4px 9px;">${esc(s.track||'기타')}</span>
      <div style="flex:1;min-width:0;font-size:13px;color:var(--text-secondary);font-variant-numeric:tabular-nums;">${s.distance?esc(s.distance+'km 완주'):''}</div>
      <div style="flex-shrink:0;font-weight:800;font-size:16px;font-variant-numeric:tabular-nums;color:var(--text-base);">${esc(s.pace)}${vbadge(s.verified)}</div>
      ${ s.best ? '<span style="flex-shrink:0;font-size:14px;" title="개인 최고 페이스">⭐</span>' : '<span style="flex-shrink:0;width:14px;"></span>' }
    </div>`).join('') || '<div style="padding:24px 4px;text-align:center;color:var(--text-secondary);font-size:13px;">제출한 기록이 없어요.</div>';

  personPanel.innerHTML = `
    <div style="padding:16px 20px 22px;background:linear-gradient(180deg,#e7eeff 0%,var(--bg-base) 100%);position:relative;overflow:hidden;">
      <img src="uploads/yonsei-symbol.jpg" alt="" aria-hidden="true" onerror="this.style.display='none'" style="position:absolute;top:-30px;right:-34px;width:150px;height:150px;object-fit:contain;opacity:0.08;mix-blend-mode:multiply;pointer-events:none;" />
      <button id="personBack" style="position:relative;background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:5px;font-family:var(--font-ui);font-size:14px;font-weight:700;color:var(--spotify-green);margin-bottom:18px;">‹ 리더보드</button>
      <div style="position:relative;display:flex;align-items:center;gap:15px;">
        <div style="width:58px;height:58px;border-radius:50%;background:linear-gradient(180deg,#3d6ff2 0%,#2f5fe0 100%);display:flex;align-items:center;justify-content:center;font-family:var(--font-title);font-size:26px;font-weight:900;color:#fff;box-shadow:0 8px 22px rgba(61,111,242,0.3);flex-shrink:0;">${esc((p.name||'?').charAt(0))}</div>
        <div style="min-width:0;">
          <div style="font-family:var(--font-title);font-size:25px;font-weight:900;letter-spacing:-0.02em;line-height:1.1;color:var(--text-base);">${esc(p.name)}</div>
          <div style="font-size:13px;color:var(--text-secondary);margin-top:3px;">${p.studentId?esc(p.studentId)+'학번':''}</div>
        </div>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;border-top:1px solid #e9ebef;">
      <div style="display:flex;gap:9px;padding:18px 18px 4px;">
        ${statCard('5KM', p.best5?esc(p.best5.disp):'—', rankTxt(p.best5))}
        ${statCard('10KM', p.best10?esc(p.best10.disp):'—', rankTxt(p.best10))}
        ${statCard('누적', p.cum?esc(p.cum.disp):'—', rankTxt(p.cum))}
      </div>
      <div style="padding:10px 20px 4px;font-size:11px;color:var(--text-secondary);opacity:0.7;">5km·10km 는 기준 거리로 환산한 완주 시간입니다.</div>
      <div style="padding:14px 18px 30px;">
        <div style="display:flex;align-items:baseline;gap:9px;margin:0 2px 14px;">
          <span style="font-family:var(--font-title);font-size:19px;font-weight:900;letter-spacing:-0.02em;color:var(--text-base);">제출 기록</span>
          <span style="font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-secondary);">${p.subs.length}건</span>
        </div>
        ${subRows}
      </div>
    </div>`;
  personPanel.style.display = 'flex';
  personPanel.style.animation = 'slideOverIn 0.28s cubic-bezier(0.2,0.8,0.2,1)';
  document.getElementById('personBack').onclick = closePerson;
}

function closePerson() {
  personPanel.style.display = 'none';
  personPanel.innerHTML = '';
}

function showMessage(msg) {
  renderTabs();
  scroller.innerHTML = `<div style="padding:56px 22px;text-align:center;color:var(--text-secondary);font-size:14px;">${msg}</div>`;
}

async function load() {
  // URL이 없을 때만(로컬 미리보기) 샘플 표시
  if (!CONFIG.APPS_SCRIPT_URL) { setData(SAMPLE); return; }
  showMessage('불러오는 중…');   // 샘플 대신 로딩 표시 → 더미 데이터 깜빡임 없음
  try {
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, { cache:'no-store', redirect:'follow' });
    const json = await res.json();
    setData(json.records || []);
  } catch (e) {
    console.warn('Apps Script 로드 실패', e);
    showMessage('데이터를 불러오지 못했습니다. 잠시 후 새로고침 해주세요.');
  }
}
load();
</script>
</body>
</html>
